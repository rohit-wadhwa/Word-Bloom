name: Deploy to Vercel

# Deploys the static site to Vercel on a version tag (vX.Y.Z) or manual run.
# Requires these repository secrets:
#   VERCEL_TOKEN       - Vercel account token (Account Settings -> Tokens)
#   VERCEL_ORG_ID      - from `vercel link` (.vercel/project.json -> orgId)
#   VERCEL_PROJECT_ID  - from `vercel link` (.vercel/project.json -> projectId)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
