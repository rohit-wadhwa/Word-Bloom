<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#6c63ff" />
  <title>WordBloom — Relax Word Puzzle</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="bg" class="bg"></div>

  <main id="app" class="app">
    <!-- Top HUD -->
    <header class="hud">
      <div class="hud-left">
        <span class="level-label">Level <span id="levelNum">1</span></span>
      </div>
      <div class="hud-right">
        <button id="muteBtn" class="icon-btn" title="Sound" aria-label="Toggle sound">🔊</button>
        <div class="coins" title="Coins">
          <span class="coin-dot">◉</span><span id="coinCount">0</span>
        </div>
      </div>
    </header>

    <!-- Answer board -->
    <section id="board" class="board" aria-label="Word board"></section>

    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- Controls + letter wheel -->
    <section class="bottom">
      <!-- Floating word preview while tracing (absolute overlay — never reflows the wheel) -->
      <div id="preview" class="preview" aria-hidden="true"></div>
      <div class="controls">
        <button id="hintBtn" class="ctrl-btn" title="Hint">
          💡<span class="cost"><span class="coin-dot">◉</span><span id="hintCost">25</span></span>
        </button>
        <button id="shuffleBtn" class="ctrl-btn" title="Shuffle">🔀</button>
      </div>
      <div id="wheel" class="wheel" aria-label="Letter wheel">
        <svg id="wheelLines" class="wheel-lines"></svg>
      </div>
    </section>
  </main>

  <!-- Level complete overlay -->
  <div id="winOverlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-emoji">🌿</div>
      <h2>Level Complete</h2>
      <p class="overlay-sub">+<span id="winReward">20</span> coins</p>
      <button id="nextBtn" class="primary-btn">Next Level</button>
    </div>
  </div>

  <!-- How-to overlay (first launch) -->
  <div id="helpOverlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-emoji">🧘</div>
      <h2>WordBloom</h2>
      <ul class="help-list">
        <li>Swipe across the wheel to connect letters.</li>
        <li>Fill every word in the crossword to clear the level.</li>
        <li>Words cross — shared letters fill in together.</li>
        <li>Find extra words for bonus coins.</li>
        <li>No timer. No pressure. Just relax. 🌿</li>
      </ul>
      <button id="startBtn" class="primary-btn">Play</button>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/board.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
